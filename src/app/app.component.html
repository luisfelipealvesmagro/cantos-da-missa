<header class="topbar">
  <div class="container bar">
    <a routerLink="/" class="brand">
      <app-icon name="church" [size]="26" class="cross" />
      <span class="title">Cantos da Missa</span>
    </a>
    <button class="theme-toggle" (click)="theme.toggle()"
            [attr.aria-label]="theme.theme() === 'dark' ? 'Modo claro' : 'Modo escuro'">
      <app-icon [name]="theme.theme() === 'dark' ? 'light_mode' : 'dark_mode'" [size]="22" />
    </button>
  </div>
</header>

<main class="container">
  <router-outlet />
</main>
