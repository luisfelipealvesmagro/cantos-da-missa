@if (song(); as s) {
  <div class="head">
    <a [routerLink]="['/categoria', s.categoryId]" class="back" aria-label="Voltar"><app-icon name="arrow_back" [size]="24" /></a>
    <div class="titles">
      <h2>{{ s.title }}</h2>
      @if (s.author) { <span class="author">{{ s.author }}</span> }
    </div>
    <a [routerLink]="['/musica', s.id, 'editar']" class="edit" aria-label="Editar"><app-icon name="edit" [size]="22" /></a>
  </div>

  <div class="toolbar">
    <div class="group">
      <span class="lbl">Tom</span>
      <button class="btn-icon" (click)="transposeDown()" aria-label="Abaixar meio tom"><app-icon name="remove" [size]="20" /></button>
      <select class="key" (change)="selectKey($any($event.target).value)" aria-label="Escolher tom">
        @for (k of keys; track k) {
          <option [value]="k" [selected]="k === currentKey()">{{ k }}</option>
        }
      </select>
      <button class="btn-icon" (click)="transposeUp()" aria-label="Subir meio tom"><app-icon name="add" [size]="20" /></button>
    </div>

    <div class="group">
      <span class="lbl">Capo</span>
      <button class="btn-icon" (click)="capoDown()" aria-label="Diminuir capotraste"><app-icon name="remove" [size]="20" /></button>
      <span class="val">{{ capo() === 0 ? '—' : capo() }}</span>
      <button class="btn-icon" (click)="capoUp()" aria-label="Aumentar capotraste"><app-icon name="add" [size]="20" /></button>
    </div>

    <div class="group">
      <button class="btn-icon" (click)="fontDown()" aria-label="Diminuir fonte"><app-icon name="text_decrease" [size]="20" /></button>
      <button class="btn-icon" (click)="fontUp()" aria-label="Aumentar fonte"><app-icon name="text_increase" [size]="20" /></button>
    </div>

    <div class="group scroll">
      <button class="btn-icon" [class.active]="scrolling()" (click)="toggleScroll()" [attr.aria-label]="scrolling() ? 'Pausar rolagem' : 'Rolar automaticamente'">
        <app-icon [name]="scrolling() ? 'pause' : 'play_arrow'" [size]="20" />
      </button>
      <input class="speed" type="range" min="1" max="10" step="1" [value]="speed()" (input)="speed.set(+$any($event.target).value)" aria-label="Velocidade da rolagem" />
    </div>
  </div>

  <app-chord-sheet [body]="s.body" [transposeSteps]="steps()" [capo]="capo()" [fontScale]="fontScale()" />

  <div class="bottom">
    <button class="btn btn-danger" (click)="deleteSong()"><app-icon name="delete" [size]="20" /> Excluir</button>
  </div>
} @else {
  <p class="loading">Carregando…</p>
}
